name: Deploy to LXCs

on:
  push:
    branches: [main]
    paths:
      - 'compose/**'
      - 'lxc/**'
      - 'compose.yml'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target LXC (all / infra / media / home / productivity / network / monitoring / utilities)'
        default: 'all'
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose syntax
        run: |
          sudo apt-get install -y docker-compose-plugin
          cp .env.example .env
          sed -i 's/=$/=dummy/g' .env
          docker compose config --quiet && echo "Compose config valid"

  deploy-infra:
    needs: validate
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'infra' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    environment: prod-infra
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROXMOX_SSH_KEY }}

      - name: Trust Proxmox host key
        run: ssh-keyscan -H "${{ secrets.PROXMOX_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Build deploy package for LXC 101 (infra)
        run: |
          # Write .env locally on the runner
          cat > /tmp/lxc101.env << EOF
          DOCKER_DIR=~/docker
          CONF_DIR=~/docker/appdata
          TZ=Europe/Amsterdam
          PUID=${{ secrets.PUID }}
          PGID=${{ secrets.PGID }}
          DOMAINNAME_1=${{ secrets.DOMAINNAME_1 }}
          HOSTNAME=infra
          PSQL_DBPASS=${{ secrets.PSQL_DBPASS }}
          AUTHENTIK_DBNAME=${{ secrets.AUTHENTIK_DBNAME }}
          AUTHENTIK_DBUSER=${{ secrets.AUTHENTIK_DBUSER }}
          AUTHENTIK_DBPASS=${{ secrets.AUTHENTIK_DBPASS }}
          AUTHENTIK_SECRET=${{ secrets.AUTHENTIK_SECRET }}
          CLOUDFLARE_IPS=${{ secrets.CLOUDFLARE_IPS }}
          LOCAL_IPS=${{ secrets.LOCAL_IPS }}
          MONGO_DBUSER=${{ secrets.MONGO_DBUSER }}
          MONGO_DBPASS=${{ secrets.MONGO_DBPASS }}
          EOF

          # Write Docker secret files locally on the runner
          printf '%s' "${{ secrets.CF_DNS_API_TOKEN}}" > /tmp/lxc101.cf_dns_api_token
          printf '%s' "${{ secrets.BASIC_AUTH_CREDENTIALS}}"  > /tmp/lxc101.basic_auth_credentials

          # Package only the compose slice this LXC needs
          tar -czf /tmp/lxc101-compose.tar.gz \
            lxc/infra/ \
            compose/reverse-proxy/ \
            compose/database/

          # Transfer all files to Proxmox in one scp call
          scp /tmp/lxc101.env \
              /tmp/lxc101.cf_dns_api_token \
              /tmp/lxc101.basic_auth_credentials \
              /tmp/lxc101-compose.tar.gz \
              root@${{ secrets.PROXMOX_SSH_HOST }}:/tmp/

      - name: Deploy into LXC 101 via Proxmox
        run: |
          ssh root@${{ secrets.PROXMOX_SSH_HOST }} << 'SCRIPT'
          set -e

          # Push .env and secrets into LXC 101
          pct push 101 /tmp/lxc101.env ~/docker/.env
          pct exec 101 -- mkdir -p ~/docker/secrets
          pct push 101 /tmp/lxc101.cf_dns_api_token       ~/docker/secrets/cf_dns_api_token
          pct push 101 /tmp/lxc101.basic_auth_credentials ~/docker/secrets/basic_auth_credentials
          pct exec 101 -- chmod 600 ~/docker/secrets/

          # Push and extract the compose slice
          pct push 101 /tmp/lxc101-compose.tar.gz /tmp/compose.tar.gz
          pct exec 101 -- bash -c "tar -xzf /tmp/compose.tar.gz -C ~/docker && rm /tmp/compose.tar.gz"

          # Bring services up
          pct exec 101 -- bash -c "
            cd ~/docker
            docker compose -f lxc/infra/compose.yml pull --quiet
            docker compose -f lxc/infra/compose.yml up -d --remove-orphans
            docker image prune -f
          "

          # Clean up Proxmox temp files
          rm -f /tmp/lxc101.*
          SCRIPT

