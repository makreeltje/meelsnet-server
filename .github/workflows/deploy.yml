name: Validate

on:
  pull_request:
    paths:
      - 'compose/**'
      - 'lxc/**'
      - 'scripts/**'
      - '.yamllint.yml'

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml compose/ lxc/

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          find scripts/ -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning
