name: Validate Compose

on:
  pull_request:
    paths:
      - 'compose/**'
      - 'lxc/**'
      - 'compose.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose syntax
        run: |
          sudo apt-get install -y docker-compose-plugin
          cp .env.example .env
          sed -i 's/=$/=dummy/g' .env
          docker compose config --quiet && echo "Compose config valid"
