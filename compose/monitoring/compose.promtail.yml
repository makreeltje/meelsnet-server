services:
  promtail:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: promtail
    image: grafana/promtail:3.6.10
    profiles: [ "monitoring", "all" ]
    command: -config.file=/mnt/config/promtail-config.yaml
    links:
      - loki
    volumes:
      - $CONF_DIR/promtail/config:/mnt/config
      - /var/log:/var/log
    ports:
      - 9080:9080
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9080/ready" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
