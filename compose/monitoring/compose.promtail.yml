services:
  promtail:
    container_name: promtail
    image: grafana/promtail:3.5.3
    restart: unless-stopped
    profiles: ["monitoring", "all"]
    networks:
      - t3_proxy
    command: -config.file=/mnt/config/promtail-config.yaml
    links:
      - loki
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      - $CONF_DIR/promtail/config:/mnt/config
      - /var/log:/var/log
    expose: 
      - 9080
    ports:
      - 9080:9080
