## File for all the Prometheus exporters
## Sonarr, Radarr, Prowlarr, SabNZBd and Mosquitto

services:
  sonarr-exporter:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: sonarr-exporter
    image: ghcr.io/onedr0p/exportarr:v2.3.0
    command: [ "sonarr" ]
    environment:
      PORT: "9707"
      URL: "http://10.10.0.20:8989"
      APIKEY: $SONARR_API_KEY
    ports:
      - 9707:9707

  radarr-exporter:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: radarr-exporter
    image: ghcr.io/onedr0p/exportarr:v2.3.0
    command: [ "radarr" ]
    environment:
      PORT: "9708"
      URL: http://10.10.0.20:7878
      APIKEY: $RADARR_API_KEY
    ports:
      - "9708:9708"

  prowlarr-exporter:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: prowlarr-exporter
    image: ghcr.io/onedr0p/exportarr:v2.3.0
    command: [ "prowlarr" ]
    environment:
      PORT: "9710"
      URL: http://10.10.0.20:9696
      APIKEY: $PROWLARR_API_KEY
    ports:
      - "9710:9710"

  sabnzbd-exporter:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: sabnzbd-exporter
    image: ghcr.io/onedr0p/exportarr:v2.3.0
    command: [ "sabnzbd" ]
    environment:
      PORT: "9711"
      URL: http://10.10.0.20:8082
      APIKEY: $SABNZBD_API_KEY
    ports:
      - "9711:9711"

  mosquitto-exporter:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: mosquitto-exporter
    image: sapcc/mosquitto-exporter:0.8.0
    profiles: [ "monitoring", "all" ]
    command:
      - --endpoint=tcp://10.10.0.30:1883
      - --user=$MOSQUITTO_USER
      - --pass=$MOSQUITTO_PASS
      - --client-id=mosquitto-exporter
    ports:
      - 9234:9234
