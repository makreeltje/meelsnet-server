services:
  immich:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: immich
    user: "$PUID:$PGID"
    image: ghcr.io/immich-app/immich-server:v2.5.6
    profiles: [ "productivity", "all" ]
    env_file:
      - $CONF_DIR/immich/.env
    volumes:
      - $PHOTOS_DIR/library:/usr/src/app/upload
      - $CONF_DIR/immich/external:/usr/src/app/external
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 2283:2283
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:2283/api/server/ping', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  immich-machine-learning:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: immich-machine-learning
    user: "$PUID:$PGID"
    image: ghcr.io/immich-app/immich-machine-learning:v2.5.6
    profiles: [ "productivity", "all" ]
    env_file:
      - $CONF_DIR/immich/.env
    volumes:
      - $CONF_DIR/immich/cache:/cache
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/ping')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
