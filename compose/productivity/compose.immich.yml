services:
  immich:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: immich
    image: ghcr.io/immich-app/immich-server:$IMMICH_VERSION
    profiles: [ "productivity", "all" ]
    env_file:
      - $CONF_DIR/immich/.env
    volumes:
      - $PHOTOS_DIR/library:/usr/src/app/upload
      - $CONF_DIR/immich/external:/usr/src/app/external
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 2283:2283
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:2283/api/server-info/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich-rtr.tls=true"
      - "traefik.http.routers.immich-rtr.entrypoints=websecure"
      - "traefik.http.routers.immich-rtr.rule=Host(`photos.$DOMAINNAME_1`)"
      - "traefik.http.routers.immich-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.immich-rtr.service=immich-svc"
      - "traefik.http.services.immich-svc.loadbalancer.server.port=2283"

  immich-machine-learning:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:$IMMICH_VERSION
    profiles: [ "productivity", "all" ]
    env_file:
      - $CONF_DIR/immich/.env
    volumes:
      - $CONF_DIR/immich/cache:/cache
    healthcheck:
      test: [ "CMD", "curl", "-fsSo", "/dev/null", "http://localhost:3003/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
