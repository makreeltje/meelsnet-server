services:
  nextcloud:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: nextcloud
    image: nextcloud:33.0.1
    profiles: [ "productivity", "all" ]
    environment:
      REDIS_HOST: 10.10.0.10
      NEXTCLOUD_DATA_DIR: /data
      NEXTCLOUD_TRUSTED_DOMAIN: cloud.$DOMAINNAME_1
      TRUSTED_PROXIES: 10.2.0.0/16
      POSTGRES_HOST: 10.10.0.10:5432
      POSTGRES_DB: $NEXTCLOUD_DBNAME
      POSTGRES_USER: $NEXTCLOUD_DBUSER
      POSTGRES_PASSWORD: $NEXTCLOUD_DBPASS
    volumes:
      - $CONF_DIR/nextcloud/config:/var/www/html
      - $CLOUD_DIR:/data
    ports:
      - 8081:80
    healthcheck:
      test: [ "CMD", "curl", "-fsSo", "/dev/null", "http://localhost:80/status.php" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
