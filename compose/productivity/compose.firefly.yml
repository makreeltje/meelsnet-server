services:
  firefly:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: firefly
    image: fireflyiii/core:version-6.5.9
    profiles: [ "productivity", "all" ]
    env_file: $CONF_DIR/firefly/.env
    volumes:
      - $CONF_DIR/firefly/upload:/var/www/html/storage/upload
    ports:
      - 10.10.0.40:8080:8080
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  cron:
    #
    # To make this work, set STATIC_CRON_TOKEN in your .env file or as an environment variable
    # The STATIC_CRON_TOKEN must be *exactly* 32 characters long
    # Use this URL for inspiration: https://www.random.org/strings/?num=1&len=32&digits=on&upperalpha=on&loweralpha=on&unique=on&format=html&rnd=new
    #
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: firefly_cron
    image: alpine
    env_file: $CONF_DIR/firefly/.env
    command: ["sh", "-c", "apk add tzdata && \
      (ln -s /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
      echo \"0 3 * * * wget -qO- http://firefly:8080/api/v1/cron/$$STATIC_CRON_TOKEN;echo\" \
      | crontab - && \
      crond -f -L /dev/stdout"]
