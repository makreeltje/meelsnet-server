services:
  omni-tools:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: omni-tools
    image: iib0011/omni-tools:0.5.0
    profiles: [ "utilities", "all" ]
    expose:
      - 80
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80/" ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.omni-tools-rtr.tls=true"
      - "traefik.http.routers.omni-tools-rtr.entrypoints=websecure"
      - "traefik.http.routers.omni-tools-rtr.rule=Host(`tools.$DOMAINNAME_1`)"
      - "traefik.http.routers.omni-tools-rtr.middlewares=chain-oauth@file"
      - "traefik.http.routers.omni-tools-rtr.service=omni-tools-svc"
      - "traefik.http.services.omni-tools-svc.loadbalancer.server.port=80"
