services:
  portainer-agent:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: portainer-agent
    image: portainer/agent:2.21.5
    profiles: [ "all" ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - 9001:9001
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate --no-verbose --tries=1 --spider https://localhost:9001/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
