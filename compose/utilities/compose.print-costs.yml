services:
  print-costs:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: print-costs
    image: ghcr.io/makreeltje/3d-printer:v0.3.0
    profiles: [ "utilities", "all" ]
    volumes:
      - $CLOUD_DIR/rick/files/Documents/Personal/3D prints:/app/3D prints
      - $CONF_DIR/print-costs/data:/app/data
      - $CONF_DIR/print-costs/.cache:/app/.cache
    ports:
      - 10.10.0.40:8002:8000
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).getcode() == 200 else 1)",]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
