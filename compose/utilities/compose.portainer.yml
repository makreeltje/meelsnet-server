services:
  portainer:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: portainer
    image: portainer/portainer-ce:2.43.0
    profiles: [ "utilities", "all" ]
    volumes:
      - $CONF_DIR/portainer/data:/data
    ports:
      - 9000:9000
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
