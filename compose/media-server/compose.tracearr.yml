services:
  tracearr:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: tracearr
    image: ghcr.io/connorgallopo/tracearr:supervised-1.4.25
    profiles: [ "media", "all" ]
    environment:
      LOG_LEVEL: debug
      TRUST_PROXY: true
    volumes:
      - $CONF_DIR/tracearr/postgres:/data/postgres
      - $CONF_DIR/tracearr/redis:/data/redis
      - $CONF_DIR/tracearr/data:/data/tracearr
    ports:
      - 10.10.0.20:3000:3000
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:3000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
