services:
  qbittorrent:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: qbittorrent
    image: binhex/arch-qbittorrentvpn:5.1
    cap_add:
      - NET_ADMIN
    profiles: [ "media", "all" ]
    environment:
      PUID: 1000
      PGID: 1000
      UMASK: 0
      VPN_ENABLED: "yes"
      VPN_USER: $VPN_USERNAME
      VPN_PASS: $VPN_PASSWORD
      VPN_PROV: $VPN_PROVIDER
      VPN_CLIENT: openvpn
      VPN_INPUT_PORTS: 1234
      VPN_OUTPUT_PORTS: 5678
      ENABLE_STARTUP_SCRIPTS: "no"
      ENABLE_PRIVOXY: "yes"
      STRICT_PORT_FORWARD: "yes"
      USERSPACE_WIREGUARD: "no"
      ENABLE_SOCKS: "yes"
      SOCKS_USER: $QBITTORRENT_USER
      SOCKS_PASS: $QBITTORRENT_PASS
      LAN_NETWORK: 192.168.2.0/24
      NAME_SERVERS: 1.1.1.1,1.0.0.1
      DEBUG: true
      WEBUI_PORT: 8080
    volumes:
      - $DOWNLOAD_DIR:/data
      - $CONF_DIR/qbittorrent/config:/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8083:8080
      - 8118:8118
      - 9118:9118
      - 58946:58946
      - 58946:58946/udp
    healthcheck:
      test: [ "CMD", "curl", "-fsSo", "/dev/null", "http://localhost:8080/api/v2/app/version" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    devices:
      - /dev/net/tun
