services:
  watchstate:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: watchstate
    image: ghcr.io/arabcoders/watchstate:v1.5.1
    profiles: [ "media", "all" ]
    user: ${PUID:-1000}:${PGID:-1000}
    volumes:
      - $CONF_DIR/watchstate/config:/config
    ports:
      - 10.10.0.20:8081:8080
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
