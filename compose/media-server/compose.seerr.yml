services:
  seerr:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:develop
    init: true
    user: root
    profiles: [ "media", "all" ]
    environment:
      LOG_LEVEL: debug
    volumes:
      - $CONF_DIR/seerr/config:/app/config
    ports:
      - 5055:5055
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3