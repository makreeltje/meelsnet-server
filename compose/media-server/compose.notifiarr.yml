services:
  notifiarr:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: notifiarr
    image: golift/notifiarr:v0.9.5-ubuntu
    profiles: [ "media", "all" ]
    environment:
      DN_API_KEY: $NOTIFIARR_API_KEY
    volumes:
      - $CONF_DIR/notifiarr/config:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    ports:
      - 10.10.0.20:5454:5454
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp6 /proc/net/tcp 2>/dev/null | grep -q '154E' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
