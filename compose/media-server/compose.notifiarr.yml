services:
  notifiarr:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: notifiarr
    image: golift/notifiarr:0.9.1
    profiles: [ "media", "all" ]
    environment:
      DN_API_KEY: $NOTIFIARR_API_KEY
    volumes:
      - $CONF_DIR/notifiarr/config:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    expose:
      - 5454
    healthcheck:
      test: [ "CMD", "curl", "-fsSo", "/dev/null", "http://localhost:5454/api/v1/healthcheck/" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notifiarr-rtr.tls=true"
      - "traefik.http.routers.notifiarr-rtr.entrypoints=websecure"
      - "traefik.http.routers.notifiarr-rtr.rule=Host(`notifiarr.$DOMAINNAME_1`)"
      - "traefik.http.routers.notifiarr-rtr.middlewares=chain-authentik@file"
      - "traefik.http.routers.notifiarr-rtr.service=notifiarr-svc"
      - "traefik.http.services.notifiarr-svc.loadbalancer.server.port=5454"
