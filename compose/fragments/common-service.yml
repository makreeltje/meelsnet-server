services:

  # Base
  common:
    restart: unless-stopped
    networks:
      - t3_proxy
    environment:
      TZ: $TZ

  # Base for host mode containers
  common-host:
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: $TZ

  # Base for LinuxServer.io containers (adds PUID/PGID)
  common-lsio:
    restart: unless-stopped
    networks:
      - t3_proxy
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ

  # Base for non-LSIO containers that depend on postgres + redis
  common-db:
    restart: unless-stopped
    networks:
      - t3_proxy
    environment:
      TZ: $TZ
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Base for LSIO containers that depend on postgres + redis (rare)
  common-lsio-db:
    restart: unless-stopped
    networks:
      - t3_proxy
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
