services:
  pihole:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: pihole
    user: $PUID:$PGID
    image: pihole/pihole:2025.07.1
    profiles: [ "network", "all" ]
    cap_add:
      - SYS_NICE
    environment:
      FTLCONF_webserver_api_password: $PIHOLE_PASS
      FTLCONF_dns_upstreams: 1.1.1.1;1.0.0.1
      FTLCONF_dns_listeningMode: all
    volumes:
      - $CONF_DIR/pihole/data:/etc/pihole
    dns:
      - 1.1.1.1
      - 1.0.0.1
    ports:
      - 80:80/tcp
      # DNS Ports
      - "53:53/tcp"
      - "53:53/udp"
    healthcheck:
      test: [ "CMD", "curl", "-fsSo", "/dev/null", "http://localhost:80/admin/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s