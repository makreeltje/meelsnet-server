services:
  adminer:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: adminer
    image: adminer:5.4.2-standalone
    profiles: [ "database", "infra", "all" ]
    ports:
      - 10.10.0.10:8080:8080
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 8080 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
