services:
  hyperion:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: hyperion
    image: amd989/hyperion.ng:main
    profiles: [ "home", "all" ]
    volumes:
      - $CONF_DIR/hyperion/config:/config
    ports:
      - "19400:19400"
      - "19444:19444"
      - "19445:19445"
      - "2100:2100"
      - "8090:8090"
      - "8092:8092"