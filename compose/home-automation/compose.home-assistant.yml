services:
  homeassistant:
    extends:
      file: ../fragments/common-service.yml
      service: common-host
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2026.4.0
    profiles: [ "home", "all" ]
    volumes:
      - $CONF_DIR/homeassistant/config:/config
      - $CONF_DIR/homeassistant/images:/images
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: [ "CMD", "curl", "-fsSo", "/dev/null", "http://localhost:8123/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
