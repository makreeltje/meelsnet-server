services:
  nodered:
    extends:
      file: ../fragments/common-service.yml
      service: common
    container_name: nodered
    image: nodered/node-red:4.1.0
    user: $PUID:$PGID
    profiles: [ "home", "all" ]
    volumes:
      - $CONF_DIR/node-red/data:/data
    ports:
      - 1880:1880
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:1880/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
