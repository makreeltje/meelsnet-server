    <text x="104" y="378" class="label">LXC 101 · infra · 10.10.0.10</text>
    <text x="104" y="402" class="meta">ingress, auth en shared datastores</text>
    <rect x="104" y="425" width="126" height="42" rx="12" fill="#0b3b2e" stroke="#34d399"/><text x="132" y="452" class="chip">Traefik</text>
    <rect x="246" y="425" width="160" height="42" rx="12" fill="#0b3b2e" stroke="#34d399"/><text x="274" y="452" class="chip">Authentik</text>
    <rect x="422" y="425" width="128" height="42" rx="12" fill="#0b3b2e" stroke="#34d399"/><text x="452" y="452" class="chip">Worker</text>
    <rect x="104" y="487" width="144" height="42" rx="12" fill="#132033" stroke="#94a3b8"/><text x="138" y="514" class="chip">Postgres</text>
    <rect x="264" y="487" width="112" height="42" rx="12" fill="#132033" stroke="#94a3b8"/><text x="302" y="514" class="chip">Redis</text>
    <rect x="392" y="487" width="120" height="42" rx="12" fill="#132033" stroke="#94a3b8"/><text x="423" y="514" class="chip">MongoDB</text>
    <rect x="104" y="549" width="190" height="24" rx="10" fill="#111827" stroke="#475569"/><text x="122" y="566" class="small">Adminer · Mongo Express</text>
  </g>

  <g>
    <rect x="610" y="340" width="550" height="248" rx="28" fill="url(#panel)" stroke="#c084fc" stroke-width="2.4" filter="url(#shadow)"/>
    <text x="636" y="378" class="label">LXC 102 · media · 10.10.0.20</text>
    <text x="636" y="402" class="meta">streaming, downloads en Arr-ecosysteem</text>
    <rect x="636" y="425" width="160" height="42" rx="12" fill="#3b0764" stroke="#c084fc"/><text x="681" y="452" class="chip">Plex</text>
    <rect x="812" y="425" width="160" height="42" rx="12" fill="#3b0764" stroke="#c084fc"/><text x="848" y="452" class="chip">Jellyfin</text>
    <rect x="988" y="425" width="146" height="42" rx="12" fill="#3b0764" stroke="#c084fc"/><text x="1024" y="452" class="chip">Seerr</text>
    <rect x="636" y="487" width="164" height="42" rx="12" fill="#1e1b4b" stroke="#a78bfa"/><text x="674" y="514" class="chip">Sonarr</text>
    <rect x="816" y="487" width="164" height="42" rx="12" fill="#1e1b4b" stroke="#a78bfa"/><text x="856" y="514" class="chip">Radarr</text>
    <rect x="996" y="487" width="138" height="42" rx="12" fill="#1e1b4b" stroke="#a78bfa"/><text x="1029" y="514" class="chip">Prowlarr</text>
    <rect x="636" y="549" width="154" height="24" rx="10" fill="#111827" stroke="#475569"/><text x="652" y="566" class="small">Bazarr · Tautulli</text>
    <rect x="804" y="549" width="184" height="24" rx="10" fill="#111827" stroke="#475569"/><text x="820" y="566" class="small">SABnzbd · qBittorrent</text>
    <rect x="1002" y="549" width="132" height="24" rx="10" fill="#111827" stroke="#475569"/><text x="1016" y="566" class="small">+ extras</text>
  </g>

  <g>
    <rect x="1192" y="340" width="480" height="248" rx="28" fill="url(#panel)" stroke="#fb923c" stroke-width="2.4" filter="url(#shadow)"/>
    <text x="1218" y="378" class="label">LXC 103 · home · 10.10.0.30</text>
    <text x="1218" y="402" class="meta">domotica, MQTT en local automation</text>
    <rect x="1218" y="425" width="178" height="42" rx="12" fill="#3f1d0d" stroke="#fb923c"/><text x="1257" y="452" class="chip">Home Assistant</text>
    <rect x="1414" y="425" width="120" height="42" rx="12" fill="#3f1d0d" stroke="#fb923c"/><text x="1441" y="452" class="chip">MQTT</text>
    <rect x="1550" y="425" width="96" height="42" rx="12" fill="#3f1d0d" stroke="#fb923c"/><text x="1570" y="452" class="chip">Z2M</text>
    <rect x="1218" y="487" width="428" height="42" rx="12" fill="#1f2937" stroke="#94a3b8"/><text x="1245" y="514" class="chip">Node-RED · Music Assistant · Hyperion · Frigate</text>
  </g>

  <!-- Row 2 -->
  <g>
