    <text x="104" y="944" class="meta">simple view, geen diepe inspectie</text>
    <rect x="104" y="970" width="228" height="42" rx="12" fill="#132033" stroke="#60a5fa"/><text x="140" y="997" class="chip">OpenClaw / Lyra</text>
  </g>

  <g>
    <rect x="470" y="882" width="360" height="182" rx="28" fill="url(#panel)" stroke="#a1a1aa" stroke-width="2.2" filter="url(#shadow)"/>
