    <text x="988" y="690" class="meta">metrics, alerts en exporters</text>
    <rect x="988" y="714" width="148" height="42" rx="12" fill="#082f49" stroke="#38bdf8"/><text x="1015" y="741" class="chip">Prometheus</text>
    <rect x="1152" y="714" width="128" height="42" rx="12" fill="#082f49" stroke="#38bdf8"/><text x="1191" y="741" class="chip">Grafana</text>
    <rect x="1296" y="714" width="98" height="42" rx="12" fill="#082f49" stroke="#38bdf8"/><text x="1313" y="741" class="chip">Alerts</text>
    <rect x="988" y="776" width="404" height="24" rx="10" fill="#111827" stroke="#475569"/><text x="1006" y="793" class="small">cAdvisor · Node Exporter · Smartctl · Mosquitto · Arr exporters</text>
  </g>

  <g>
    <rect x="1452" y="628" width="220" height="214" rx="28" fill="url(#panel)" stroke="#a1a1aa" stroke-width="2.2" filter="url(#shadow)"/>
    <text x="1478" y="666" class="label">LXC 107 · utilities</text>
    <text x="1478" y="690" class="meta">10.10.0.70</text>
    <rect x="1478" y="714" width="168" height="24" rx="10" fill="#111827" stroke="#475569"/><text x="1502" y="731" class="small">IT-Tools · Omni-Tools</text>
    <rect x="1478" y="750" width="168" height="24" rx="10" fill="#111827" stroke="#475569"/><text x="1498" y="767" class="small">Spoolman · Printer Calc</text>
