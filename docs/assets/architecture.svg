<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1320" viewBox="0 0 1800 1320" role="img" aria-labelledby="title desc">
  <title id="title">Meelsnet homelab architecture</title>
  <desc id="desc">Proxmox host with LXC containers for infra, media, home automation, productivity, network, monitoring, utilities, OpenClaw and money.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#101826"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 40px Inter,Segoe UI,Arial,sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 18px Inter,Segoe UI,Arial,sans-serif; fill: #94a3b8; }
      .section { font: 700 20px Inter,Segoe UI,Arial,sans-serif; fill: #e2e8f0; }
      .label { font: 700 17px Inter,Segoe UI,Arial,sans-serif; fill: #f8fafc; }
      .meta { font: 400 13px Inter,Segoe UI,Arial,sans-serif; fill: #94a3b8; }
      .small { font: 500 13px Inter,Segoe UI,Arial,sans-serif; fill: #cbd5e1; }
      .chip { font: 600 13px Inter,Segoe UI,Arial,sans-serif; fill: #e2e8f0; }
      .edge { stroke: #64748b; stroke-width: 2.5; fill: none; opacity: 0.9; }
      .edge-soft { stroke: #475569; stroke-width: 2; fill: none; opacity: 0.7; }
      .edge-accent { stroke: #38bdf8; stroke-width: 3; fill: none; opacity: 0.9; }
      .edge-auth { stroke: #34d399; stroke-width: 3; fill: none; opacity: 0.9; }
      .edge-mqtt { stroke: #fb923c; stroke-width: 3; fill: none; opacity: 0.9; }
      .edge-mon { stroke: #a78bfa; stroke-width: 3; fill: none; opacity: 0.9; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fb923c"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1800" height="1320" fill="url(#bg)"/>

  <text x="70" y="78" class="title">Meelsnet Server · Homelab Architecture</text>
  <text x="70" y="110" class="subtitle">Actuele LXC/Docker indeling op Proxmox, met ingress, auth, stack-separatie en observability</text>

  <rect x="50" y="145" width="1700" height="1125" rx="34" fill="rgba(15,23,42,0.55)" stroke="#334155" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="78" y="190" class="section">Proxmox host · srv-mn</text>
  <text x="78" y="214" class="meta">vmbr0 = LAN 192.168.2.0/24 · vmbr1 = service network 10.10.0.0/24</text>

  <g>
    <rect x="78" y="242" width="180" height="56" rx="16" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="102" y="276" class="label">Internet / WAN</text>
  </g>
  <g>
    <rect x="280" y="242" width="210" height="56" rx="16" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
    <text x="304" y="276" class="label">GitHub / GitOps</text>
  </g>
  <g>
    <rect x="512" y="242" width="220" height="56" rx="16" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
    <text x="537" y="276" class="label">LAN · 192.168.2.0/24</text>
  </g>
  <g>
    <rect x="754" y="242" width="248" height="56" rx="16" fill="#0f172a" stroke="#818cf8" stroke-width="2"/>
    <text x="779" y="276" class="label">Service net · 10.10.0.0/24</text>
  </g>

