    <rect x="636" y="714" width="116" height="42" rx="12" fill="#132033" stroke="#60a5fa"/><text x="671" y="741" class="chip">Pi-hole</text>
    <rect x="768" y="714" width="136" height="42" rx="12" fill="#132033" stroke="#60a5fa"/><text x="808" y="741" class="chip">UniFi</text>
